name: Deploy Mercado Express via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🚀 Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies & Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    - name: 📤 Enviar FRONTEND (Pasta dist) para a Raiz
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./frontend/dist/  # 👈 Envia só o resultado final do front
        server-dir: ./              # 👈 Joga direto na raiz (/mercado-express)
        dangerous-clean-html: false

    - name: 📤 Enviar BACKEND para subpasta /backend
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./backend/       # 👈 Envia a pasta do PHP
        server-dir: ./backend/      # 👈 Cria e joga na pasta /mercado-express/backend
        dangerous-clean-html: false